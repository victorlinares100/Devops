name: CI/CD Tienda Perritos - Frontend

on:
  push:
    branches: [ "deploy" ]

jobs:
  build-push-deploy-frontend:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout del código
      - name: Checkout código
        uses: actions/checkout@v3

      # 2. Configurar credenciales AWS desde GitHub Secrets
      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 3. Login en Amazon ECR
      - name: Login en Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      # 4. Build de la imagen frontend y push a ECR
      - name: Build imagen Frontend y Push a ECR
        run: |
          cd frontend
          docker build \
            --build-arg VITE_API_URL=${{ secrets.VITE_API_URL }} \
            -t tienda-frontend .
          docker tag tienda-frontend:latest ${{ secrets.ECR_REPO_URL_FRONTEND }}:latest
          docker push ${{ secrets.ECR_REPO_URL_FRONTEND }}:latest

      # 5. Desplegar frontend en EC2 vía SSM
      - name: Desplegar Frontend en EC2 vía SSM
        run: |
          aws ssm send-command \
            --instance-ids ${{ secrets.EC2_FRONTEND_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --comment "Actualizar tienda-frontend desde ECR" \
            --parameters commands='[
              "set -e",
              "aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}",
              "docker pull ${{ secrets.ECR_REPO_URL_FRONTEND }}:latest",
              "docker stop tienda-frontend || true",
              "docker rm tienda-frontend || true",
              "docker run -d --name tienda-frontend -p 80:80 --restart unless-stopped ${{ secrets.ECR_REPO_URL_FRONTEND }}:latest"
            ]' \
            --output text